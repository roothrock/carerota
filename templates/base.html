<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CareRota</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #f4f6f9; }
  nav.navbar { background: #005EB8 !important; }
  .navbar-brand, .nav-link { color: #fff !important; }
  .nav-link:hover { text-decoration: underline; }
  .rota-card { border: none; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 24px; padding: 24px; background: #fff; }
  h2, h3 { color: #005EB8; }
  .badge-off    { background: #fce4e4; color: #c62828; padding: 2px 8px; border-radius: 12px; font-size: 12px; display:inline-block; }
  .badge-pref   { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 12px; font-size: 12px; display:inline-block; }
  .cell-off     { background: #f5f5f5 !important; color: #bbb; text-align: center; font-size: 13px; }
  .cell-working { background: #f0f7ff !important; }
  .day-select   { font-size: 13px; padding: 4px 6px; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
  .rota-table th { background: #005EB8; color: #fff; }
  .week-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .week-nav a { font-size: 26px; color: #005EB8; text-decoration: none; font-weight: bold; }
  .week-label { font-size: 18px; font-weight: bold; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0 16px 0; }
  .checkbox-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold fs-5" href="/rota">CareRota</a>
    <div class="d-flex gap-4">
      <a class="nav-link" href="/rota">Rota</a>
      <a class="nav-link" href="/staff">Staff</a>
      <a class="nav-link" href="/clients">Clients</a>
    </div>
  </div>
</nav>

<div class="container py-4" style="max-width:1100px">
  {% for msg in get_flashed_messages() %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
