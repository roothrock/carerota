{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Edit Staff — {{ member["name"] }}</h2>
  <form method="POST">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <label>Full Name</label>
        <input type="text" name="name" value="{{ member['name'] }}" required>
      </div>
      <div>
        <label>Email</label>
        <input type="email" name="email" value="{{ member['email'] or '' }}">
      </div>
    </div>
    <label>Regular Days Off</label>
    <div class="checkbox-group">
      {% for day in days %}
        <label>
          <input type="checkbox" name="off_days" value="{{ day }}"
            {% if day in off_days %}checked{% endif %}>
          {{ day }}
        </label>
      {% endfor %}
    </div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/staff" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
