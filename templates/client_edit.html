{% extends "base.html" %}
{% block content %}
<div class="rota-card">
  <h2 class="mb-4">Edit Client &mdash; {{ client["name"] }}</h2>
  <form method="POST">
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="form-label">Client Name</label>
        <input type="text" name="name" class="form-control" value="{{ client['name'] }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Address</label>
        <input type="text" name="address" class="form-control" value="{{ client['address'] or '' }}">
      </div>
    </div>
    <label class="form-label">Preferred Carer(s)</label>
    <div class="checkbox-group mb-4">
      {% for s in staff %}
        <label>
          <input type="checkbox" name="preferred_staff" value="{{ s['id'] }}"
            {% if s['id']|string in preferred %}checked{% endif %}>
          {{ s["name"] }}
        </label>
      {% endfor %}
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/clients" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
