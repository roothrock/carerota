{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Edit Client — {{ client["name"] }}</h2>
  <form method="POST">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <label>Client Name</label>
        <input type="text" name="name" value="{{ client['name'] }}" required>
      </div>
      <div>
        <label>Address</label>
        <input type="text" name="address" value="{{ client['address'] or '' }}">
      </div>
    </div>
    <label>Preferred Carer(s)</label>
    <div class="checkbox-group">
      {% for s in staff %}
        <label>
          <input type="checkbox" name="preferred_staff" value="{{ s['id'] }}"
            {% if s['id']|string in preferred %}checked{% endif %}>
          {{ s["name"] }}
        </label>
      {% endfor %}
    </div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/clients" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
